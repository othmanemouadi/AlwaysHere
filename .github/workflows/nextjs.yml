# Deploy the AlwaysHere static landing page to GitHub Pages.
#
# The full AlwaysHere app is a Next.js server app (Twilio voice webhooks under
# /api/voice/* plus a Postgres-backed dashboard) and cannot be statically
# exported, so GitHub Pages serves a self-contained static landing page from
# ./site instead. To run the real app, deploy it to a server host (Railway,
# Render, Vercel + a Postgres database).
name: Deploy AlwaysHere landing page to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do NOT cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
